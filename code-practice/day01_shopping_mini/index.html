<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>買い物プラン練習</title>
  <link rel="stylesheet" href="style.css?v=82">
</head>
<body>
  <h1>3日分の買い物プラン練習</h1>

  <p>家にある食材を入力すると、3日分の献立と買い足しメモを表示します。</p>

  <input id="foodInput" type="text" placeholder="例：豆腐、肉、キャベツ">
  <p class="input-note">食材は「、」や「,」で区切って入力できます。</p>
  <button onclick="showPlan()">3日分プランを出す</button>

  <div id="result">
  <p class="input-note">食材を入力してボタンを押すと、ここに結果が表示されます。</p>
</div>

  <script src="script.js?v=144"></script>
</body>
</html>
